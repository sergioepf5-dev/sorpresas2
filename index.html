<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAAAA</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            transition: background-color 1s ease;
        }

        /* 1. INICIO: Todo blanco y centrado */
        body.inicio {
            background-color: #ffffff;
        }

        #btn-iniciar {
            padding: 25px 50px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            background-color: #ff4081;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 64, 129, 0.5);
            z-index: 100;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #btn-iniciar:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.7);
        }

        /* 2. SORPRESA: Fondo amarillo */
        body.sorpresa {
            background-color: #FFEB3B;
        }

        .contenido-sorpresa {
            display: none;
            text-align: center;
            z-index: 50;
        }

        body.sorpresa .contenido-sorpresa {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 5rem;
            color: #333;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
        }

        /* --- GLOBOS REALISTAS --- */
        .contenedor-globos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;
            display: none;
        }

        .globo {
            position: absolute;
            bottom: -150px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            opacity: 0;
            animation: flotarGlobos infinite linear;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Brillo suave del globo */
        .globo::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 25px;
            height: 25px;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 50%;
            filter: blur(2px);
        }

        /* Nudo del globo */
        .globo::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 42px;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid var(--globo-color);
        }

        @keyframes flotarGlobos {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            90% { opacity: 0.9; }
            100% { transform: translateY(-120vh) rotate(15deg); opacity: 0; }
        }

        /* --- Confeti Infinito --- */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #ffd700;
            opacity: 0.8;
            border-radius: 50%;
            animation: fall infinite linear;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* --- Elementos Flotantes (Gatos y Fotos) --- */
        .floating-element {
            position: absolute;
            bottom: -250px;
            width: 180px;
            height: auto;
            opacity: 0.98;
            z-index: 20;
            animation: floatUp infinite ease-in;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-10deg); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-60vh) rotate(15deg); }
            90% { opacity: 1; }
            100% { transform: translateY(-130vh) rotate(-10deg); opacity: 0; }
        }
    </style>
</head>
<body class="inicio">

    <!-- BOTÓN DE INICIO -->
    <button id="btn-iniciar">HOLA PRESIONAR AQUI</button>

    <!-- CONTENIDO: FELIZ 20 YADHIRA -->
    <div class="contenido-sorpresa">
        <h1>FELIZ 20 YADHIRA</h1>
    </div>

    <!-- CONTENEDORES PARA EFECTOS -->
    <div class="contenedor-globos" id="globos-wrapper"></div>
    <div class="confetti-container" id="confetti-wrapper"></div>
    <div id="floating-wrapper"></div>

    <!-- AUDIO -->
    <audio id="musica" loop preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('btn-iniciar');
        const body = document.body;
        const musica = document.getElementById('musica');
        const globosWrapper = document.getElementById('globos-wrapper');
        const confettiWrapper = document.getElementById('confetti-wrapper');
        const floatingWrapper = document.getElementById('floating-wrapper');

        const elementosFlotantes = [
            'https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTE0YWQ1MDNkYjU0YjRlOGFiNzAxMGIyNGExNmUzNmY5ZTgxYjBkZCZjdD1z/owjkiwz58Lmes/giphy.gif',
            'gato-duerme.gif',
            'foto1.jpeg',
            'foto2.jpeg',
            'foto3.jpeg',
            'foto4.jpeg'
        ];

        // Usamos una variable para rastrear si es la "explosión inicial"
        let explosionInicial = true;

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            body.classList.remove('inicio');
            body.classList.add('sorpresa');

            // Reproducir Música
            musica.play();

            // 1. Iniciar los globos (con la explosión inicial habilitada)
            iniciarGlobos();
            iniciarConfetiInfinito();

            // 2. Iniciar fotos y GIFs con 1.5 segundos de retraso
            setTimeout(() => {
                iniciarElementosFlotantes();
            }, 1500);
        });

        // --- FUNCIONES DE EFECTOS ---

        function iniciarGlobos() {
            globosWrapper.style.display = 'block';
            const coloresGlobos = ['#ff1744', '#2979ff', '#00e676', '#ffea00', '#ff4081', '#ffffff'];

            // Función interna para crear UN globo
            function crearGlobo(posicionInicial = null) {
                const globo = document.createElement('div');
                globo.classList.add('globo');
                
                // Determinar posición horizontal
                let posicionX;
                if (posicionInicial !== null) {
                    posicionX = posicionInicial; // Posición forzada (para la explosión)
                } else {
                    posicionX = Math.random() * 90 + 5 + 'vw'; // Aleatoria (flujo normal)
                }
                
                globo.style.left = posicionX;
                
                const color = coloresGlobos[Math.floor(Math.random() * coloresGlobos.length)];
                globo.style.background = `radial-gradient(circle at 35% 35%, #fff 0%, ${color} 40%, ${color} 100%)`;
                globo.style.setProperty('--globo-color', color);

                // Variar velocidad y tamaño ligeramente para realismo
                const duracion = (Math.random() * 4 + 6) + 's'; // Entre 6 y 10s
                globo.style.animationDuration = duracion;
                
                const escala = 1 + (Math.random() * 0.3 - 0.15); // Variación ±15%
                globo.style.transform = `scale(${escala})`;

                globosWrapper.appendChild(globo);

                // Eliminar después de la animación
                // Usamos la duración máxima posible para asegurar que se elimine
                setTimeout(() => globo.remove(), 11000); 
            }

            // --- FASE 1: EXPLOSIÓN INICIAL (Solo la primera vez) ---
            if (explosionInicial) {
                // Crear 15 globos de golpe concentrados en el centro-abajo
                for (let i = 0; i < 15; i++) {
                    // Concentrados alrededor del centro (50% ± 10vw)
                    const posicionConcentrada = (50 + (Math.random() * 20 - 10)) + 'vw';
                    crearGlobo(posicionConcentrada);
                }
                explosionInicial = false; // Desactivar para el flujo normal
            }

            // --- FASE 2: FLUJO NORMAL (Continuo y aleatorio) ---
            setInterval(() => {
                crearGlobo(); // Crear un globo aleatorio
            }, 1000); // Un globo nuevo cada 1s
        }

        function iniciarConfetiInfinito() {
            const coloresConfeti = ['#ff1744', '#2979ff', '#00e676', '#ffea00', '#ff4081', '#ffffff'];
            setInterval(() => {
                const pajarito = document.createElement('div');
                pajarito.classList.add('confetti');
                pajarito.style.left = Math.random() * 100 + 'vw';
                pajarito.style.backgroundColor = coloresConfeti[Math.floor(Math.random() * coloresConfeti.length)];
                pajarito.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confettiWrapper.appendChild(pajarito);

                setTimeout(() => pajarito.remove(), 5000);
            }, 100);
        }

        function iniciarElementosFlotantes() {
            setInterval(() => {
                const src = elementosFlotantes[Math.floor(Math.random() * elementosFlotantes.length)];
                const img = document.createElement('img');
                img.src = src;
                img.classList.add('floating-element');
                img.style.left = Math.random() * 80 + 10 + 'vw';
                img.style.animationDuration = (Math.random() * 6 + 4) + 's'; 

                floatingWrapper.appendChild(img);

                setTimeout(() => img.remove(), 10000); 
            }, 800);
        }
    </script>

</body>
</html>

</body>
</html>
