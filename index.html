<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Sorpresa!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        /* Estado Inicial: Fondo Negro */
        body.inicio {
            background-color: #000000;
        }

        /* Estado Sorpresa: Fondo Amarillo */
        body.sorpresa {
            background-color: #FFEB3B;
        }

        #btn-iniciar {
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            background-color: #e91e63;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .contenido {
            display: none;
            text-align: center;
            z-index: 5;
        }

        body.sorpresa .contenido {
            display: block;
        }

        h1 {
            font-size: 3.5rem;
            color: #222;
            margin: 0;
        }

        /* Globos simples */
        .globo {
            position: absolute;
            bottom: -120px;
            width: 80px;
            height: 100px;
            border-radius: 50%;
            opacity: 0.8;
            animation: flotar 8s infinite linear;
        }

        @keyframes flotar {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }
    </style>
</head>
<body class="inicio">

    <button id="btn-iniciar">👉 TOCA AQUÍ PARA LA SORPRESA 👈</button>

    <div class="contenido">
        <h1>¡FELIZ CUMPLEAÑOS! 🥳🎉</h1>
    </div>

    <div id="contenedor-globos"></div>

    <audio id="musica" loop preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('btn-iniciar');
        const body = document.body;
        const musica = document.getElementById('musica');
        const globosContainer = document.getElementById('contenedor-globos');

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            body.classList.remove('inicio');
            body.classList.add('sorpresa');

            // Crear globos
            const colores = ['#ff1744', '#2979ff', '#00e676', '#ffea00', '#d500f9'];
            for (let i = 0; i < 15; i++) {
                const globo = document.createElement('div');
                globo.classList.add('globo');
                globo.style.backgroundColor = colores[i % colores.length];
                globo.style.left = Math.random() * 90 + 'vw';
                globo.style.animationDelay = Math.random() * 5 + 's';
                globosContainer.appendChild(globo);
            }

            // Reproducir música tras la interacción del usuario
            musica.play().catch(e => {
                alert("Error: Asegúrate de que musica.mp3 no esté vacío y esté subido en GitHub.");
            });
        });
    </script>
</body>
</html>
