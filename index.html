<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Sorpresa!</title>
  
  <!-- Librería Canvas Confetti para la animación de confeti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      transition: background-color 0.8s ease;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Botón inicial */
    .btn-sorpresa {
      padding: 18px 36px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
      background-color: #f0f0f0;
      border: 2px solid #ccc;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      z-index: 10;
    }

    .btn-sorpresa:hover {
      transform: scale(1.05);
      background-color: #e2e2e2;
    }

    /* Mensaje de Cumpleaños */
    .mensaje-cumple {
      display: none;
      font-size: 3.5rem;
      font-weight: 900;
      color: #222;
      text-align: center;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.15);
      z-index: 10;
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      padding: 20px;
    }

    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Animación de Globos */
    .globo {
      position: absolute;
      bottom: -120px;
      width: 50px;
      height: 70px;
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      opacity: 0.85;
      z-index: 5;
      animation: flotar 6s linear infinite;
    }

    .globo::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 23px;
      width: 2px;
      height: 15px;
      background-color: rgba(0,0,0,0.2);
    }

    @keyframes flotar {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-120vh) rotate(20deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Botón inicial -->
  <button id="btn" class="btn-sorpresa" onclick="revelarSorpresa()">Presiona aquí</button>

  <!-- Texto de cumpleaños -->
  <h1 id="mensaje" class="mensaje-cumple">¡FELIZ CUMPLEAÑOS! 🥳🎉</h1>

  <!-- Elemento de audio usando el archivo subido al repositorio -->
  <audio id="musica" preload="auto">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script>
    function revelarSorpresa() {
      // 1. Cambiar color de fondo a amarillo
      document.body.style.backgroundColor = "#FFE135";

      // 2. Ocultar el botón y mostrar el mensaje gigante
      document.getElementById('btn').style.display = 'none';
      document.getElementById('mensaje').style.display = 'block';

      // 3. Reproducir música
      const audio = document.getElementById('musica');
      audio.play().catch(e => console.log("Error al reproducir audio:", e));

      // 4. Disparar confeti inicial
      lanzarConfeti();

      // 5. Crear ráfagas continuas de confeti
      setInterval(() => {
        confetti({
          particleCount: 40,
          spread: 80,
          origin: { y: 0.6 }
        });
      }, 1500);

      // 6. Generar globos flotantes
      crearGlobos();
    }

    function lanzarConfeti() {
      const duration = 3 * 1000;
      const animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

      const interval = setInterval(function() {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);

        const particleCount = 50 * (timeLeft / duration);
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
      }, 250);
    }

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function crearGlobos() {
      const colores = ['#FF4081', '#7C4DFF', '#00E676', '#FF9100', '#00B0FF', '#FFD600'];
      
      setInterval(() => {
        const globo = document.createElement('div');
        globo.classList.add('globo');
        
        globo.style.left = Math.random() * 100 + 'vw';
        globo.style.backgroundColor = colores[Math.floor(Math.random() * colores.length)];
        globo.style.animationDuration = randomInRange(4, 8) + 's';
        
        document.body.appendChild(globo);

        setTimeout(() => {
          globo.remove();
        }, 8000);
      }, 400);
    }
  </script>
</body>
</html>
