<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Sorpresa!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fde047; /* Fondo amarillo */
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #1e293b;
            margin-bottom: 20px;
        }

        .btn-play {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #ef4444;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-play:hover {
            background-color: #dc2626;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>¡FELIZ CUMPLEAÑOS! 🥳🎉</h1>

    <!-- Botón para iniciar la música -->
    <button class="btn-play" id="btnMusica">🎵 Toca aquí para la sorpresa 🎵</button>

    <!-- Elemento de Audio fuera del H1 -->
    <audio id="musica" loop preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
        Tu navegador no soporta el reproductor de audio.
    </audio>

    <script>
        const boton = document.getElementById('btnMusica');
        const audio = document.getElementById('musica');

        boton.addEventListener('click', () => {
            audio.play().then(() => {
                boton.innerText = "🎶 ¡Música sonando! 🎶";
            }).catch(error => {
                console.log("Error al reproducir:", error);
                alert("No se pudo reproducir el audio. Verifica que musica.mp3 esté en el repositorio.");
            });
        });
    </script>

</body>
</html>
